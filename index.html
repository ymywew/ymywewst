<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт Александра</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      height: 100%;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 2.5em;
      margin: 10px 20px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      animation: fadeInDown 1.5s ease forwards;
    }

    p {
      font-size: 1.2em;
      margin: 10px 20px;
      animation: fadeInUp 2s ease forwards;
    }

    .btn {
      background-color: #fff;
      color: #66a6ff;
      border: none;
      padding: 12px 25px;
      margin-top: 30px;
      font-size: 1em;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      animation: fadeIn 2.5s ease forwards;
    }

    .btn:hover {
      background-color: #66a6ff;
      color: #fff;
    }

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-50px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(50px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>Привет! Я Александр Имушев, добро пожаловать на мой сайт!</h1>
  <p>Мой юзернейм в Телеграм — <a href="https://t.me/fr2ov" target="_blank" style="color: #fff; text-decoration: underline;">t.me/@fr2ov</a></p>

  <button class="btn" onclick="alert('Спасибо за посещение сайта!')">Нажми меня</button>

</body>
</html>
